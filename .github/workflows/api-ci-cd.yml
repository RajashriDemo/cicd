name: BasicWebAPI CI/CD

on:
  push:
    branches: [dev, qa, main]
    paths:
      - 'BasicWebAPI/**'

permissions:
  contents: write

jobs:

  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BasicWebAPI

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:

    - name: Checkout Code
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0.x'

    - name: Generate Version
      id: version
      run: |
        VERSION=1.0.${{ github.run_number }}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Restore
      run: dotnet restore BasicWebAPI.sln

    - name: Build
      run: dotnet build BasicWebAPI.sln --configuration Release --no-restore

    - name: Test
      run: dotnet test BasicWebAPI.Tests/BasicWebAPI.Tests.csproj --no-build

    - name: Publish
      run: dotnet publish BasicWebAPI/BasicWebAPI.csproj -c Release -o publish

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: basicwebapi-${{ steps.version.outputs.version }}
        path: BasicWebAPI/publish

    - name: Create Git Tag
      if: github.ref == 'refs/heads/main'
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        TAG=v${{ steps.version.outputs.version }}
        git tag $TAG
        git push origin $TAG